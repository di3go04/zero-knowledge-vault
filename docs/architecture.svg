  <rect x="70" y="180" width="260" height="30" fill="#1a2030" rx="4"/><text x="200" y="200" text-anchor="middle" fill="#aaa">AES-256-GCM + RSA-OAEP</text>
  <rect x="70" y="220" width="260" height="30" fill="#1a2030" rx="4"/><text x="200" y="240" text-anchor="middle" fill="#aaa">ML-KEM-768</text>
