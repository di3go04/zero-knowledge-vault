<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="monospace" font-size="12">
  <rect width="800" height="600" fill="#0a0e1a"/>
