# Gitleaks configuration for Zero-Knowledge Vault
# https://github.com/gitleaks/gitleaks#configuration

title = "zk-vault gitleaks config"

[extend]
useDefault = true

# ===== Allowlist: known-safe patterns =====
[allowlist]
description = "Allowed patterns (test fixtures, env examples, lock files)"
paths = [
  '''bun\.lock''',
  '''package-lock\.json''',
  '''yarn\.lock''',
  '''.*\.test\.ts$''',
  '''.*\.spec\.ts$''',
  '''.*\.snap$''',
  '''.env\.example''',
  '''README\.md''',
  '''ARCHITECTURE\.md''',
  '''DEPLOYMENT\.md''',
  '''AUDITING\.md''',
  '''SECURITY_CHECKLIST\.md''',
  '''docs/.*''',
]
regexes = [
  # Test/example placeholders
  '''test[a-zA-Z0-9_-]{8,}''',
  '''example[a-zA-Z0-9_-]{8,}''',
  '''pk_test_[a-zA-Z0-9]{20,}''',  # Stripe test keys
  # Markdown / documentation snippets in backticks
  '''`[a-fA-F0-9]{32,}`''',
]

# ===== Custom rules =====
[[rules]]
id = "zk-vault-master-key"
description = "Master key (32+ hex/base64)"
regex = '''masterKey['"\s:=]+['"]?[A-Fa-f0-9+/=]{32,}['"]?'''
tags = ["zk-vault", "key"]

[[rules]]
id = "zk-vault-wrapped-key"
description = "Wrapped vault key (long base64)"
regex = '''wrapped[A-Za-z]*Key['"\s:=]+['"]?[A-Za-z0-9+/=]{200,}['"]?'''
tags = ["zk-vault", "key"]

[[rules]]
id = "zk-vault-jwt-secret"
description = "JWT signing secret"
regex = '''JWT_SECRET['"\s:=]+['"][A-Za-z0-9+/=]{16,}['"]'''
tags = ["zk-vault", "jwt"]
