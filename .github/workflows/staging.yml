name: Deploy to Staging

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  deploy-staging:
    name: Deploy PR Preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      
      - name: Install dependencies
        run: bun install
      
      - name: Lint
        run: bun run lint || true
      
      - name: Test
        run: bun run test
      
      - name: Build
        run: bun run build
        env:
          SESSION_SECRET: "staging-secret-key-not-for-production-use-32chars!!"
      
      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **Staging checks passed**\n- Lint: ✅\n- Tests: ✅\n- Build: ✅\n\nThis PR is ready for review.'
            })
