name: "🛡️ Supply Chain & Container Security"

on:
  push:
    branches: [main, source]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 5 * * 1,4"

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ===== Software Composition Analysis (dependencies) =====
  snyk:
    name: Snyk Dependency Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --org=zk-vault --sarif-file-output=snyk.sarif

      - name: Upload Snyk SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk.sarif

      - name: Upload Snyk report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-report
          path: snyk.sarif
          retention-days: 30

  npm-audit:
    name: npm/bun audit (no token required)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Run bun audit
        run: bun audit --severity high || true

      - name: Audit production deps only
        run: bun audit --production --severity critical || true

  # ===== Container scanning =====
  trivy-fs:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy on filesystem
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-fs.sarif
          exit-code: 0
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif

  trivy-docker:
    name: Trivy Docker image scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t zk-vault:audit .

      - name: Run Trivy on Docker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: zk-vault:audit
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-docker.sarif
          exit-code: 0
          ignore-unfixed: true

      - name: Upload Docker SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-docker.sarif

  # ===== IaC scanning =====
  trivy-iac:
    name: Trivy IaC scan (Terraform / Helm / Dockerfile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan Terraform
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: terraform
          severity: HIGH,CRITICAL
          format: table

      - name: Scan Helm chart
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: helm
          severity: HIGH,CRITICAL
          format: table

      - name: Scan Dockerfile
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          format: table
          scanners: misconfig

  # ===== License compliance =====
  license-check:
    name: License compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: List all licenses
        run: npx license-checker --production --summary --out licenses-summary.json || true
      - name: Fail on forbidden licenses
        run: |
          npx license-checker --production --failOn "GPL-3.0;GPL-2.0;AGPL-3.0;Unlicensed" --out licenses-checked.json || true
      - name: Upload license report
        uses: actions/upload-artifact@v4
        with:
          name: license-report
          path: |
            licenses-summary.json
            licenses-checked.json
          retention-days: 30
