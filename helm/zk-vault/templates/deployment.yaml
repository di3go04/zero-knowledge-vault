apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-zk-vault
  labels:
    app: zk-vault
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: zk-vault
  template:
    metadata:
      labels:
        app: zk-vault
    spec:
      containers:
        - name: zk-vault
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@{{ .Release.Name }}-postgresql:5432/{{ .Values.postgresql.auth.database }}"
            - name: REDIS_URL
              value: "redis://{{ .Release.Name }}-redis:6379"
            - name: SESSION_SECRET
              value: {{ .Values.env.SESSION_SECRET | quote }}
            - name: DECOY_HMAC_KEY
              value: {{ .Values.env.DECOY_HMAC_KEY | quote }}
            - name: NODE_ENV
              value: "production"
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.service.port }}
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-zk-vault
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
  selector:
    app: zk-vault
