replicaCount: 2
image:
  repository: zk-vault
  tag: latest
  pullPolicy: IfNotPresent
service:
  type: ClusterIP
  port: 3000
ingress:
  enabled: true
  className: nginx
  hosts:
    - host: vault.example.com
      paths:
        - path: /
          pathType: Prefix
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi
postgresql:
  enabled: true
  auth:
    username: zkvault
    password: zkvault
    database: zkvault
redis:
  enabled: true
  auth:
    enabled: false
env:
  SESSION_SECRET: "change-me-min-32-chars"
  DECOY_HMAC_KEY: "change-me-decoy"
