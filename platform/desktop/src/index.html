<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zero-Knowledge Vault</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }
    #root { min-height: 100vh; display: flex; flex-direction: column; }
    .header {
      padding: 16px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .header h1 { font-size: 20px; color: #4ade80; }
    main { flex: 1; padding: 24px; }
    .placeholder {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 60vh; color: #64748b;
      text-align: center;
    }
    .placeholder p { margin-top: 8px; }
  </style>
</head>
<body>
  <div id="root">
    <header class="header">
      <h1>Zero-Knowledge Vault</h1>
    </header>
    <main>
      <div class="placeholder">
        <h2>Escritorio</h2>
        <p>La aplicación de escritorio carga la interfaz web completa de ZK Vault.</p>
        <p style="margin-top: 16px; font-size: 12px;">
          En desarrollo, usa Tauri dev server proxying a Next.js.
        </p>
      </div>
    </main>
  </div>
</body>
</html>
